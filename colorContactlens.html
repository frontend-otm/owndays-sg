        // Global state
        let activeTab = 'horoscope';
        let showAllColors = false;
        let selectedLens = null;

        // Get mobile banner image
        function getMobileBannerImg(bannerImgUrl, isMobileView) {
            if (!bannerImgUrl) return '';
            if (!isMobileView) return bannerImgUrl;
            const lastDot = bannerImgUrl.lastIndexOf('.');
            if (lastDot === -1) return bannerImgUrl;
            return bannerImgUrl.slice(0, lastDot) + '-sp' + bannerImgUrl.slice(lastDot);
        }

        // Update responsive images
        function updateResponsiveImages() {
            const isMobileView = isMobile();
            const baseUrl = 'https://static1.lenskart.com/owndays/img/contacts';
            
            const horoscopeCard = document.getElementById('horoscopeCard');
            const petalCard = document.getElementById('petalCard');
            
            if (horoscopeCard) {
                const imageName = isMobileView ? 'owndays-horoscope-cl-box-sp.webp' : 'owndays-horoscope-cl-box.webp';
                horoscopeCard.style.backgroundImage = `url('${baseUrl}/${imageName}')`;
            }
            
            if (petalCard) {
                const imageName = isMobileView ? 'owndays-petal-series-cl-box-sp.webp' : 'owndays-petal-series-cl-box.webp';
                petalCard.style.backgroundImage = `url('${baseUrl}/${imageName}')`;
            }

            // Update all img elements with -sp in src
            const allImages = document.querySelectorAll('img');
            allImages.forEach(img => {
                const src = img.getAttribute('src');
                if (!src) return;
                
                if (isMobileView) {
                    if (src.includes('color-spec-image.webp') && !src.includes('-sp.webp')) {
                        img.src = src.replace('color-spec-image.webp', 'color-spec-image-sp.webp');
                    }
                } else {
                    if (src.includes('-sp.webp')) {
                        img.src = src.replace(/-sp\.webp/g, '.webp');
                    }
                }
            });
        }

        // Set active tab
        function setActiveTab(tab) {
            activeTab = tab;
            showAllColors = false;
            const colorList = activeTab === 'horoscope' ? HOROSCOPE_COLORS : PETAL_COLORS;
            selectedLens = colorList[0];
            
            // Update tab buttons
            document.querySelectorAll('.bcc-tab').forEach(btn => btn.classList.remove('active'));
            document.getElementById('horoscopeTabMobile')?.classList.toggle('active', tab === 'horoscope');
            document.getElementById('petalTabMobile')?.classList.toggle('active', tab === 'petal');
            document.getElementById('horoscopeTabDesktop')?.classList.toggle('active', tab === 'horoscope');
            document.getElementById('petalTabDesktop')?.classList.toggle('active', tab === 'petal');
            
            renderColorList();
            renderBanner();
            renderDescriptions();
            renderSpecs();
        }

        // Toggle view more
        function toggleViewMore() {
            showAllColors = !showAllColors;
            const btn = document.getElementById('viewMoreBtn');
            if (btn) {
                btn.textContent = showAllColors ? 'VIEW LESS COLOURS' : 'VIEW MORE COLOURS';
            }
            renderColorList();
        }

        // Select lens
        function selectLens(lens) {
            selectedLens = lens;
            renderBanner();
            renderColorList();
        }

        // Render color list
        function renderColorList() {
            const colorList = activeTab === 'horoscope' ? HOROSCOPE_COLORS : PETAL_COLORS;
            const visibleColors = showAllColors ? colorList : colorList.slice(0, 4);
            
            const mobileList = document.getElementById('colorListMobile');
            const desktopList = document.getElementById('colorListDesktop');
            
            const renderItem = (color, index) => `
                <div class="bcc-coloritem${selectedLens?.name === color.name ? ' selected' : ''}" onclick="selectLensByIndex(${index}, '${activeTab}')">
                    <img alt="${color.name}" src="${color.img}">
                    <div class="bcc-colorname">${color.name}</div>
                </div>
            `;
            
            if (mobileList) {
                mobileList.innerHTML = visibleColors.map((color, idx) => {
                    const fullIndex = colorList.findIndex(c => c.name === color.name);
                    return renderItem(color, fullIndex);
                }).join('');
            }
            
            if (desktopList) {
                desktopList.innerHTML = colorList.map((color, idx) => renderItem(color, idx)).join('');
            }
            
            // Show/hide view more button
            const viewMoreBtn = document.getElementById('viewMoreBtn');
            if (viewMoreBtn) {
                viewMoreBtn.style.display = colorList.length > 4 ? 'flex' : 'none';
            }
        }

        // Select lens by index
        function selectLensByIndex(index, tab) {
            const colorList = tab === 'horoscope' ? HOROSCOPE_COLORS : PETAL_COLORS;
            if (colorList[index]) {
                selectedLens = colorList[index];
                renderBanner();
                renderColorList();
            }
        }

        // Render banner
        function renderBanner() {
            const colorList = activeTab === 'horoscope' ? HOROSCOPE_COLORS : PETAL_COLORS;
            const bannerImg = getMobileBannerImg(
                selectedLens?.bannerImg || colorList[0]?.bannerImg || '',
                isMobile()
            );
            
            const mobileBanner = document.getElementById('bannerImageMobile');
            const desktopBanner = document.getElementById('bannerImageDesktop');
            
            if (mobileBanner) mobileBanner.src = bannerImg;
            if (desktopBanner) desktopBanner.src = selectedLens?.bannerImg || colorList[0]?.bannerImg || '';
        }

        // Render descriptions
        function renderDescriptions() {
            const descBlocks = TAB_DESCRIPTIONS[activeTab];
            const mobileDesc = document.getElementById('descBlockMobile');
            const desktopDesc = document.getElementById('descBlockDesktop');
            
            const html = descBlocks.map(desc => `
                <div class="bcc-desc-title">${desc.title}</div>
                <div class="bcc-desc-text">${desc.text}</div>
            `).join('');
            
            if (mobileDesc) mobileDesc.innerHTML = html;
            if (desktopDesc) desktopDesc.innerHTML = html;
        }

        // Render specs
        function renderSpecs() {
            const currentSpecData = SPEC_DATA[activeTab] || SPEC_DATA.horoscope;
            const specCard = document.getElementById('colorSpecCard');
            
            if (specCard) {
                specCard.innerHTML = currentSpecData.map(item => `
                    <div class="color-contact-spec__row">
                        <span class="color-contact-spec__label">${item.label}</span>
                        <span class="color-contact-spec__value">${item.value}</span>
                    </div>
                `).join('');
            }
        }

                { q: 'Do you offer free shipping?', a: 'Yes, shipping is free for orders over S$20.' },
                { q: 'How long does delivery take?', a: '1-2 business days' },
            ],
            prescription: [
                { q: 'How do I find my prescription?', a: 'You can check your latest prescriptions <a href="/sg/en/customer/prescriptions" class="faq-link">here</a>. Alternatively, you could schedule a free consultation with one of our optometrists. <br/><br/><a href="/stores/sg?bookingOption=contact-lens" class="faq-link faq-link-arrow">Book your free consultation</a>' },

        // FAQ state
        let currentCategory = 'all';
        let openIdxs = [];

        // FAQ Functions
        function setActiveCategory(category) {
            currentCategory = category;
            openIdxs = [];
            
            // Update active tab
            document.querySelectorAll('.faq-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderFAQDesktop();
        }

        function setActiveCategoryMobile(category) {
            currentCategory = category;
            openIdxs = [];
            
            // Update active tab
            document.querySelectorAll('.faq-mobile-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderFAQMobile();
        }

        function toggleFAQ(idx) {
            if (openIdxs.includes(idx)) {
                openIdxs = openIdxs.filter(i => i !== idx);
            } else {
                openIdxs.push(idx);
            }
            renderFAQDesktop();
            renderFAQMobile();
        }

        function renderFAQDesktop() {
            const faqs = FAQ_DATA[currentCategory] || [];
            const faqList = document.getElementById('faqListDesktop');
            
            if (!faqList) return;
            
            faqList.innerHTML = faqs.map((faq, idx) => `
                <div class="faq-item" onclick="toggleFAQ(${idx})">
                    <div class="faq-item-content">
                        <span class="faq-question">${faq.q}</span>
                        <img
                            alt="${openIdxs.includes(idx) ? 'Collapse' : 'Expand'}"
                            class="faq-plus-icon${openIdxs.includes(idx) ? ' open' : ''}"
                            src="${openIdxs.includes(idx) ? baseImgUrl + '/faq-minus-icon.webp' : baseImgUrl + '/faq-plus-icon.webp'}"
                        />
                    </div>
                    ${openIdxs.includes(idx) ? `<div class="faq-answer">${faq.a}</div>` : ''}
                </div>
            `).join('');
        }

        function renderFAQMobile() {
            const faqs = FAQ_DATA[currentCategory] || [];
            const faqList = document.getElementById('faqListMobile');
            
            if (!faqList) return;
            
            // Use -sp version for mobile, regular version for desktop
            const arrowImage = isMobile() 
                ? `${baseImgUrl}/faq-arrow-sp.webp`
                : `${baseImgUrl}/faq-arrow.webp`;
            
            faqList.innerHTML = faqs.map((faq, idx) => `
                <div class="faq-mobile-item">
                    <div class="faq-mobile-item-content" onclick="toggleFAQ(${idx})">
                        <span class="faq-mobile-question">${faq.q}</span>
                        <img
                            alt="Expand"
                            class="faq-mobile-plus-icon${openIdxs.includes(idx) ? ' open' : ''}"
                            src="${arrowImage}"
                        />
                    </div>
                    ${openIdxs.includes(idx) ? `<div class="faq-mobile-answer">${faq.a}</div>` : ''}
                </div>
            `).join('');
        }


        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize color contacts
            setActiveTab('horoscope');
            
            // Update responsive images
            updateResponsiveImages();
            
            // Initialize FAQ
            renderFAQDesktop();
            renderFAQMobile();
            
            // Also run after a short delay to ensure all elements are ready
            setTimeout(function() {
                updateResponsiveImages();
            }, 100);
        });
        
        // Also run immediately if DOM is already loaded
        if (document.readyState === 'loading') {
            // DOM is still loading, wait for DOMContentLoaded
        } else {
            // DOM is already loaded, run immediately
            updateResponsiveImages();
            setActiveTab('horoscope');
        }

        // Debounce function for resize
        let resizeTimeout;
        function debounceResize() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function() {
                updateResponsiveImages();
                renderBanner();
                // Re-render FAQs to update arrow images
                renderFAQMobile();
            }, 150);
        }

        // Update on window resize
        window.addEventListener('resize', debounceResize);
    </script>
