        const categoriesEl = document.getElementById("newsCategories");
        const newsListEl = document.getElementById("newsList");

        let selectedCategory = "ALL";

        function renderCategories() {
            categoriesEl.innerHTML = "";
            NEWS_CATEGORIES.forEach((cat) => {
                const li = document.createElement("li");
                li.textContent = cat.name;
                li.className =
                    selectedCategory === cat.name ? "selected-new-category" : "";
                li.addEventListener("click", () => {
                    selectedCategory = cat.name;
                    renderCategories();
                    renderNews();
                });
                categoriesEl.appendChild(li);
            });
        }

        function renderNews() {
            newsListEl.innerHTML = "";
            const filtered =
                selectedCategory === "ALL"
                    ? ITEMS_NEWS
                    : ITEMS_NEWS.filter((item) => item.category === selectedCategory);

            filtered.forEach((item, index) => {
                const li = document.createElement("li");
                li.setAttribute("data-aos", "zoom-in");
                li.setAttribute("data-aos-delay", index * 200); // ms
                li.innerHTML = `
              <a href="${item.slug}">
                <figure>
                  <div class="blog-news__list-thumbnail">
                    <img src="${item.image}" alt="${item.title}" loading="lazy">
                  </div>
                  <figcaption>
                    <h4 class="blog-news__list-category">${item.category}</h4>
                    <p class="blog-news__list-title">${item.title}</p>
                    <p class="blog-news__list-view-more">VIEW MORE</p>
                  </figcaption>
                </figure>
              </a>
            `;
                newsListEl.appendChild(li);
            });
        }

        document.addEventListener("DOMContentLoaded", function () {
            console.log("DOM loaded, running scripts");
            renderCategories();
            renderNews();
            AOS.init({
                duration: 1200,
            });
        });
    </script>
