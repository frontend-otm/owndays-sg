            // Insert after every 4th card
            const parent = card.closest("ul");
            const insertAfterIndex = Math.floor(index / 4) * 4 + 3;
            if (cards[insertAfterIndex]) {
              cards[insertAfterIndex].parentNode.insertAdjacentElement("afterend", details);
            } else {
              parent.appendChild(details);
            }

            // Reveal slider container (CSS uses opacity until visible)
            const sliderContainer = details.querySelector(".brands__details-slider");
            if (sliderContainer) {
              sliderContainer.classList.add("is-visible");
            }

            // Initialize Slick only after the element is in the DOM
            const sliderEl = details.querySelector(".brands__slider");
            if (!jq) return;
            if (sliderEl && !jq(sliderEl).hasClass("slick-initialized") && typeof jq.fn.slick === "function") {
              jq(sliderEl).slick({
                slidesToShow: 1,
                dots: true,
                arrows: true,
                infinite: true,
                adaptiveHeight: true,
                speed: 400,
                cssEase: "ease"
              });

              // Ensure Slick recalculates sizes after reveal and image loads
              jq(sliderEl).slick("setPosition");
              const imgs = sliderEl.querySelectorAll("img");
              imgs.forEach(img => {
                if (img.complete) return;
                img.addEventListener("load", () => {
                  if (jq(sliderEl).hasClass("slick-initialized")) {
                    jq(sliderEl).slick("setPosition");
                  }
                }, { once: true });
              });

              // Also on window resize
              window.addEventListener("resize", () => {
                if (jq(sliderEl).hasClass("slick-initialized")) {
                  jq(sliderEl).slick("setPosition");
                }
              });
            } else if (sliderEl && typeof jq?.fn?.slick !== "function") {
              console.error("brands: Slick not loaded or jQuery.fn.slick missing.");
            }

            setTimeout(() => {
              // Scroll card to top of window
              card.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
          });
        });

        // Close handler
        list.addEventListener("click", function (e) {
          if (e.target.closest(".brands__details-close")) {
            const details = e.target.closest(".brands__details");
            if (details) {
              jq && jq(details)
                .find(".brands__slider")
                .each((_, slider) => {
                  if (jq && jq(slider).hasClass("slick-initialized")) {
                    jq(slider).slick("unslick");
                  }
                });
              details.remove();
            }
          }
        });

        // Auto-open the first brand on load to ensure content is visible
        // if (cards.length > 0) {
        //   setTimeout(() => {
        //     cards[0].click();
        //   }, 0);
        // }
      }, 2000);
    });
  </script>
